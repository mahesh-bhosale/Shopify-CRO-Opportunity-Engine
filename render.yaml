services:
  - type: web
    name: shopify-cro-engine-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: MAX_PAGES_TO_SCRAPE
        value: "4"
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /api/health
